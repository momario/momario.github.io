<!DOCTYPE html>
<html>
<head>
  <title>KONJUGATOR</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="script.js"></script>
</head>
<body>
  <div id="header">
    <h1>KONJUGATOR</h1>
  </div>
  <table id="translation_table">
      <tr>
          <td><span id="random_verb_es"></span></td>
      </tr>
      <tr>
          <td><input type="text" id="translation_table_verb" placeholder="translation ..."></td>
      </tr>
      <tr>
          <td><input type="submit" id="translation_table_submit" value="APPROVE TRANSLATION"></td>
      </tr>
  <table>    
  <div id="wrong_div2">ANSWER WAS NOT CORRECT</div>
  <div id="correct_div2">ANSWER WAS CORRECT</div>
  <div id="correct_div3"></div>
  <div id="correct_div4"></div>
  <table id="conjugation_table">
    <tr>
      <th>SUBJECT</th>
      <th>VERB</th>
    </tr>
  </table>
  <div id="wrong_div">ANSWER WAS NOT CORRECT</div>
  <div id="correct_div">ANSWER WAS CORRECT</div>
  <div id="all_correct_div">
    YEAH! ALL THE ANSWERS WERE CORRECT
    <button id="next_verb">NEXT VERB</button>
  </div>
</body>
