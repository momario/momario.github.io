<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Shake Animation</title>
    <style>
        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: translateX(-10px);
            }
            20%, 40%, 60%, 80% {
                transform: translateX(10px);
            }
        }

        .error-shake {
            animation: shake 0.6s ease-in-out;
        }

        /* Additional styling for the button */
        .error-button {
            background-color: #ff6347; /* Tomato color for error */
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button id="errorButton" class="error-button" onclick="handleError()">Click me</button>

<script>
    function handleError() {
        var button = document.getElementById('errorButton');
        button.classList.add('error-shake');

        // Remove the shake class after the animation completes
        setTimeout(function() {
            button.classList.remove('error-shake');
        }, 600); // 600 milliseconds is the duration of the shake animation
    }
</script>

</body>
</html>
